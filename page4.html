<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<title>ഇംപോസ്റ്റർ ഗെയിം</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Noto Sans Malayalam',sans-serif;
overflow:hidden;
color:white;
background:linear-gradient(135deg,#1f2933,#2c3e50);
}

/* container */

.container{
width:90%;
max-width:480px;
padding:35px;
border-radius:20px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
box-shadow:0 8px 25px rgba(0,0,0,.4);
text-align:center;
}

/* header */

.header{
font-size:32px;
font-weight:bold;
margin-bottom:15px;
}

/* card */

.record-card{
margin-top:20px;
padding:25px;
border-radius:18px;
background:rgba(0,0,0,.35);
}

/* buttons */

button{
border:none;
cursor:pointer;
font-family:'Noto Sans Malayalam';
}

.record-btn{
margin-top:12px;
padding:12px 26px;
border-radius:25px;
background:#e74c3c;
color:white;
font-weight:bold;
}

.reveal-btn{
width:100%;
margin-top:22px;
padding:14px;
border-radius:25px;
font-size:17px;
background:#ecf0f1;
color:#222;
font-weight:bold;
}

/* video preview */

video{
margin-top:15px;
width:100%;
border-radius:15px;
display:none;
background:black;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
ഇംപോസ്റ്റർ ആരാണ്?
</div>

<p>
<span id="currentPlayer">കളിക്കാരൻ</span>
സംഭാഷണം ആരംഭിക്കുന്നു!
</p>

<div class="record-card">

<h3>🎥 റെക്കോർഡ് ചെയ്യൂ</h3>
<p>ക്യാമറ + മൈക്ക് ഉപയോഗിച്ച് റെക്കോർഡ് ചെയ്യാം</p>

<button class="record-btn" id="recordBtn">
🎙️ റെക്കോർഡ് ആരംഭിക്കുക
</button>

<video id="preview" autoplay muted></video>

</div>

<button class="reveal-btn">
കള്ളനെയും വാക്കിനെയും വെളിപ്പെടുത്തുക
</button>

</div>

<script>

/* ================= PLAYER ================= */

let players =
JSON.parse(localStorage.getItem("playerNames"))
|| ["കളിക്കാരൻ 1"];

document.getElementById("currentPlayer")
.innerText = players[0];


/* ================= RECORDING ================= */

let mediaRecorder;
let recordedChunks=[];
let stream=null;
let recording=false;

const recordBtn=document.getElementById("recordBtn");
const videoPreview=document.getElementById("preview");

recordBtn.onclick = async ()=>{

/* START RECORDING */
if(!recording){

try{

stream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

videoPreview.style.display="block";
videoPreview.srcObject=stream;

mediaRecorder = new MediaRecorder(stream);

recordedChunks=[];

mediaRecorder.ondataavailable=e=>{
if(e.data.size>0)
recordedChunks.push(e.data);
};

mediaRecorder.onstop=()=>{

const blob=new Blob(recordedChunks,{
type:"video/webm"
});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="imposter_recording.webm";
a.click();

stream.getTracks().forEach(track=>track.stop());

videoPreview.style.display="none";
};

mediaRecorder.start();

recordBtn.innerText="⏹️ റെക്കോർഡ് നിർത്തുക";
recording=true;

}catch(err){
alert("Camera permission required!");
}

/* STOP RECORDING */
}else{

mediaRecorder.stop();

recordBtn.innerText="🎙️ റെക്കോർഡ് ആരംഭിക്കുക";
recording=false;

}

};

/* ================= REVEAL NAVIGATION ================= */

const revealBtn = document.querySelector(".reveal-btn");
revealBtn.addEventListener("click", () => {
  // carry imposter index forward for result page
  const thief = localStorage.getItem("thiefIndex");
  if (thief !== null) {
    localStorage.setItem("imposterIndex", thief);
  }
  window.location.href = "page5.html";
});

</script>

</body>
</html>
